<!DOCTYPE html>
<html lang="el">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Extras Calculator</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap');

  :root {
    --bg: #0e0e0f;
    --surface: #18181b;
    --surface2: #222226;
    --border: #2e2e34;
    --accent: #e8ff47;
    --accent-dim: rgba(232,255,71,0.12);
    --text: #f0f0f0;
    --muted: #888;
    --danger: #ff4f4f;
    --success: #47ffb2;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-weight: 300;
    min-height: 100vh;
  }

  /* ─── LOGIN ─── */
  #login-screen {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--bg);
  }

  .login-box {
    width: 360px;
    padding: 48px 40px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
  }

  .login-box h1 {
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    font-weight: 400;
    color: var(--accent);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-bottom: 32px;
  }

  .login-box label {
    display: block;
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  .login-box input {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 14px;
    padding: 10px 14px;
    margin-bottom: 20px;
    outline: none;
    transition: border-color 0.2s;
  }

  .login-box input:focus { border-color: var(--accent); }

  .login-btn {
    width: 100%;
    background: var(--accent);
    color: #0e0e0f;
    border: none;
    border-radius: 8px;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 500;
    padding: 12px;
    cursor: pointer;
    transition: opacity 0.2s;
  }

  .login-btn:hover { opacity: 0.88; }
  .login-error { color: var(--danger); font-size: 12px; margin-top: 10px; min-height: 16px; }

  /* ─── APP ─── */
  #app { display: none; }

  header {
    border-bottom: 1px solid var(--border);
    padding: 0 32px;
    height: 56px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .logo {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: var(--accent);
    letter-spacing: 0.12em;
    text-transform: uppercase;
  }

  .logout-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--muted);
    font-size: 12px;
    padding: 6px 14px;
    border-radius: 6px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .logout-btn:hover { border-color: var(--text); color: var(--text); }

  .main-layout {
    display: grid;
    grid-template-columns: 1fr 360px;
    gap: 0;
    min-height: calc(100vh - 56px);
  }

  /* ─── LEFT PANEL ─── */
  .left-panel {
    padding: 40px 40px;
    border-right: 1px solid var(--border);
  }

  .panel-title {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 24px;
  }

  .upload-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    margin-bottom: 28px;
  }

  .upload-zone {
    border: 1px dashed var(--border);
    border-radius: 12px;
    padding: 28px 20px;
    text-align: center;
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
  }

  .upload-zone:hover { border-color: var(--accent); background: var(--accent-dim); }
  .upload-zone.filled { border-style: solid; border-color: var(--accent); background: var(--accent-dim); }

  .upload-zone .icon {
    font-size: 28px;
    margin-bottom: 10px;
  }

  .upload-zone .zone-label {
    font-size: 13px;
    font-weight: 500;
    color: var(--text);
    margin-bottom: 4px;
  }

  .upload-zone .zone-sub {
    font-size: 11px;
    color: var(--muted);
  }

  .file-name {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--accent);
    margin-top: 8px;
    word-break: break-all;
  }

  .calc-btn {
    width: 100%;
    background: var(--accent);
    color: #0e0e0f;
    border: none;
    border-radius: 10px;
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    font-weight: 500;
    padding: 14px;
    cursor: pointer;
    transition: opacity 0.2s;
    letter-spacing: 0.02em;
  }

  .calc-btn:disabled { opacity: 0.3; cursor: not-allowed; }
  .calc-btn:not(:disabled):hover { opacity: 0.88; }

  /* ─── RESULTS ─── */
  #results-area { margin-top: 32px; }

  .vehicle-badge {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 14px;
    font-size: 13px;
    margin-bottom: 20px;
  }

  .vehicle-badge .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); }

  .extras-table { width: 100%; border-collapse: collapse; }

  .extras-table th {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    text-align: left;
    padding: 0 0 12px;
    border-bottom: 1px solid var(--border);
  }

  .extras-table th:last-child { text-align: right; }

  .extras-table td {
    padding: 12px 0;
    border-bottom: 1px solid var(--border);
    font-size: 14px;
  }

  .extras-table td:last-child { text-align: right; font-family: 'DM Mono', monospace; font-size: 13px; color: var(--accent); }

  .extras-table .code-cell { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--muted); }

  .not-found-section { margin-top: 20px; }

  .not-found-section .nf-title {
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  .nf-item {
    font-size: 13px;
    color: var(--danger);
    padding: 4px 0;
    opacity: 0.7;
  }

  .total-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 24px;
    padding: 16px 20px;
    background: var(--accent-dim);
    border: 1px solid var(--accent);
    border-radius: 10px;
  }

  .total-bar .total-label {
    font-size: 13px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }

  .total-bar .total-value {
    font-family: 'DM Mono', monospace;
    font-size: 22px;
    color: var(--accent);
    font-weight: 500;
  }

  .pdf-btn {
    margin-top: 16px;
    width: 100%;
    background: none;
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 10px;
    font-size: 14px;
    padding: 12px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .pdf-btn:hover { border-color: var(--accent); color: var(--accent); }

  .loading-state {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 24px 0;
    color: var(--muted);
    font-size: 14px;
  }

  .spinner {
    width: 18px;
    height: 18px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    flex-shrink: 0;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .error-box {
    background: rgba(255,79,79,0.08);
    border: 1px solid rgba(255,79,79,0.3);
    border-radius: 8px;
    padding: 12px 16px;
    font-size: 13px;
    color: var(--danger);
    margin-top: 16px;
  }

  /* ─── RIGHT PANEL (HISTORY) ─── */
  .right-panel { padding: 40px 28px; overflow-y: auto; max-height: calc(100vh - 56px); }

  .history-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 20px;
  }

  .clear-btn {
    background: none;
    border: none;
    color: var(--muted);
    font-size: 11px;
    cursor: pointer;
    text-decoration: underline;
  }
  .clear-btn:hover { color: var(--danger); }

  .history-empty {
    color: var(--muted);
    font-size: 13px;
    text-align: center;
    padding: 40px 0;
    line-height: 1.8;
  }

  .history-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 16px;
    margin-bottom: 10px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .history-card:hover { border-color: var(--accent); }

  .history-card .h-vehicle {
    font-size: 13px;
    font-weight: 500;
    margin-bottom: 4px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .history-card .h-meta {
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .history-card .h-date { font-size: 11px; color: var(--muted); }
  .history-card .h-total { font-family: 'DM Mono', monospace; font-size: 13px; color: var(--accent); }

  

  .apikey-box input {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    padding: 10px 14px;
    margin-bottom: 16px;
    outline: none;
  }

  .apikey-box input:focus { border-color: var(--accent); }
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-box">
    <h1>Extras Calculator</h1>
    <label>Username</label>
    <input type="text" id="username" placeholder="admin" autocomplete="username" />
    <label>Password</label>
    <input type="password" id="password" placeholder="••••••••" autocomplete="current-password"
      onkeydown="if(event.key==='Enter')doLogin()" />
    <button class="login-btn" onclick="doLogin()">Είσοδος</button>
    <p class="login-error" id="login-error"></p>
  </div>
</div>

<!-- APP -->
<div id="app">
  <header>
    <span class="logo">Extras Calc</span>
    <button class="logout-btn" onclick="doLogout()">Αποσύνδεση</button>
  </header>

  <div class="main-layout">
    <!-- LEFT -->
    <div class="left-panel">
      <p class="panel-title">Νέα Ανάλυση</p>

      <div class="upload-grid">
        <div class="upload-zone" id="zone-price" onclick="document.getElementById('f-price').click()">
          <div class="icon">📄</div>
          <div class="zone-label">Τιμοκατάλογος</div>
          <div class="zone-sub">PDF extras</div>
          <div class="file-name" id="fname-price"></div>
          <input type="file" id="f-price" accept=".pdf" style="display:none" onchange="onFile(this,'price')">
        </div>
        <div class="upload-zone" id="zone-data" onclick="document.getElementById('f-data').click()">
          <div class="icon">🚗</div>
          <div class="zone-label">Data Card</div>
          <div class="zone-sub">PDF ή εικόνα</div>
          <div class="file-name" id="fname-data"></div>
          <input type="file" id="f-data" accept=".pdf,.jpg,.jpeg,.png" style="display:none" onchange="onFile(this,'data')">
        </div>
      </div>

      <button class="calc-btn" id="calc-btn" disabled onclick="runAnalysis()">
        Υπολόγισε αξία extras
      </button>

      <div id="results-area"></div>
    </div>

    <!-- RIGHT: HISTORY -->
    <div class="right-panel">
      <div class="history-header">
        <p class="panel-title" style="margin:0">Ιστορικό</p>
        <button class="clear-btn" onclick="clearHistory()">Εκκαθάριση</button>
      </div>
      <div id="history-list"></div>
    </div>
  </div>
</div>

<script>
// ─── CONFIG ───────────────────────────────────────────
// Αλλαξε εδω τα credentials οπως θελεις
const USERS = {
  'admin': 'extras2024',
  'user2': 'password2'
};

// ─── STATE ────────────────────────────────────────────
let files = { price: null, data: null };
let currentResult = null;

// ─── INIT ─────────────────────────────────────────────
window.onload = () => {
  // Always require login on page load
  localStorage.removeItem('loggedIn');
  showScreen('login');
};

function showScreen(name) {
  document.getElementById('login-screen').style.display = name === 'login' ? 'flex' : 'none';
  document.getElementById('app').style.display = name === 'app' ? 'block' : 'none';
}

// ─── AUTH ─────────────────────────────────────────────
function doLogin() {
  const u = document.getElementById('username').value.trim();
  const p = document.getElementById('password').value;
  if (USERS[u] && USERS[u] === p) {
    localStorage.setItem('loggedIn', 'true');
    document.getElementById('login-error').textContent = '';
    showScreen('app');
    renderHistory();
  } else {
    document.getElementById('login-error').textContent = 'Λάθος στοιχεία.';
  }
}

function doLogout() {
  localStorage.removeItem('loggedIn');
  showScreen('login');
}

function showApiKeyPrompt() {
  const key = prompt('Βάλε το Anthropic API Key σου (sk-ant-...):');
  if (key && key.startsWith('sk-ant-')) {
    localStorage.setItem('apikey', key);
  }
}

// ─── FILE HANDLING ────────────────────────────────────
function onFile(input, key) {
  const f = input.files[0];
  if (!f) return;
  files[key] = f;
  document.getElementById('zone-' + key).classList.add('filled');
  document.getElementById('fname-' + key).textContent = f.name.length > 22 ? f.name.slice(0,20)+'…' : f.name;
  document.getElementById('calc-btn').disabled = !(files.price && files.data);
}

function toBase64(file) {
  return new Promise((res, rej) => {
    const r = new FileReader();
    r.onload = () => res(r.result.split(',')[1]);
    r.onerror = () => rej(new Error('Read failed'));
    r.readAsDataURL(file);
  });
}

// ─── ANALYSIS ─────────────────────────────────────────
async function runAnalysis() {
  const btn = document.getElementById('calc-btn');
  const area = document.getElementById('results-area');
  btn.disabled = true;
  btn.textContent = 'Αναλύω...';
  area.innerHTML = '<div class="loading-state"><div class="spinner"></div><span>Ο AI διαβάζει τα αρχεία…</span></div>';

  try {
    const [priceB64, dataB64] = await Promise.all([toBase64(files.price), toBase64(files.data)]);
    const dataType = files.data.name.match(/\.pdf$/i) ? 'application/pdf' : 'image/jpeg';

    const content = [
      { type: 'document', source: { type: 'base64', media_type: 'application/pdf', data: priceB64 } },
      { type: dataType === 'application/pdf' ? 'document' : 'image', source: { type: 'base64', media_type: dataType, data: dataB64 } },
      { type: 'text', text: `Είσαι ειδικός στην αποτίμηση extras αυτοκινήτων για τελωνειακούς σκοπούς. Έχεις δύο αρχεία:
1. ΤΙΜΟΚΑΤΑΛΟΓΟΣ (πρώτο αρχείο): περιέχει κωδικούς extras με τιμές DLP/LLP ανά έκδοση οχήματος
2. DATA CARD (δεύτερο αρχείο): ο εξοπλισμός του συγκεκριμένου οχήματος

ΚΑΝΟΝΕΣ - ΕΦΑΡΜΟΣΕ ΟΛΟΥΣ ΑΥΣΤΗΡΑ:

ΚΑΝΟΝΑΣ 1 - ΕΚΔΟΣΗ ΟΧΗΜΑΤΟΣ:
Βρες από το data card τον ακριβή κωδικό έκδοσης (π.χ. 156.912 για GLA 180d, 205.040 για C180).
Χρησιμοποίησε ΜΟΝΟ την αντίστοιχη στήλη του τιμοκαταλόγου. Χρέωσε ΜΟΝΟ κωδικούς που υπάρχουν ρητά στη Data Card.

ΚΑΝΟΝΑΣ 2 - ΜΟΝΟ ΧΡΕΩΣΙΜΑ EXTRAS:
Ένα extra έχει αξία ΜΟΝΟ αν στη στήλη της έκδοσης γράφει "l" (available at extra charge) ΚΑΙ η τιμή DLP > 0.
Αν γράφει "S" (standard), "-" (not available), ή κενό = €0. ΜΗΝ τον χρεώνεις.

ΚΑΝΟΝΑΣ 3 - PACKAGES / ΠΑΚΕΤΑ (ΚΡΙΣΙΜΟΣ):
Πολλά extras περιλαμβάνονται σε πακέτα (π.χ. P27, P59, P44, P17 κλπ).
Αν ένα extra ΠΕΡΙΛΑΜΒΑΝΕΤΑΙ (included/comprising) σε πακέτο που ήδη υπολογίζεις, ΜΗΝ το μετράς ξεχωριστά.
Διάβασε προσεκτικά τη γραμμή "consisting of" ή "comprising" ή "included" κάθε πακέτου.
ΠΑΡΑΔΕΙΓΜΑ: Αν υπολογίζεις P27 Style (600€) που includes κωδικό 280, τότε ο 280 μόνος του = €0.

ΚΑΝΟΝΑΣ 4 - ΔΙΠΛΗ ΚΑΤΑΜΕΤΡΗΣΗ:
Αν ένας κωδικός εμφανίζεται στο data card ΚΑΙ είναι included σε πακέτο που μετράς = μετράει ΜΟΝΟ μια φορά (μέσω του πακέτου).

ΚΑΝΟΝΑΣ 5 - ΕΛΕΓΞΕ ΟΛΕΣ ΤΙΣ ΣΕΛΙΔΕΣ:
Ψάξε κάθε κωδικό σε ΟΛΕΣ τις σελίδες του τιμοκαταλόγου πριν αποφασίσεις αν είναι standard ή extra.

ΚΑΝΟΝΑΣ 6 - ΤΙΜΗ:
Χρησιμοποίησε πάντα την τιμή DLP/LLP που αντιστοιχεί στη συγκεκριμένη έκδοση και συνδυασμό κωδικών.
Αν υπάρχουν διαφορετικές τιμές "in conjunction with code X", χρησιμοποίησε την σωστή βάσει των κωδικών του οχήματος.

Απάντησε ΜΟΝΟ σε JSON χωρίς backticks:
{"vehicle":"μάρκα μοντέλο (κωδικός έκδοσης)","extras":[{"name":"περιγραφή","code":"κωδικός","value":123.45,"note":"σημείωση αν χρειάζεται"}],"packages_used":["κωδικοί πακέτων που χρησιμοποιήθηκαν"],"not_found":["κωδικοί που δεν βρέθηκαν"],"total":0}` }
    ];

    const apiKey = localStorage.getItem('apikey');
    if (!apiKey) { showApiKeyPrompt(); throw new Error('Βάλε API Key πρώτα!'); }
    const resp = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': apiKey,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({ model: 'claude-sonnet-4-6', max_tokens: 4000, system: 'Είσαι ειδικός τελωνειακής αποτίμησης extras αυτοκινήτων. Απαντάς ΠΑΝΤΑ και ΜΟΝΟ με έγκυρο JSON. Ποτέ κείμενο, εξηγήσεις ή σχόλια εκτός JSON. Είσαι πολύ προσεκτικός με τα packages και δεν μετράς ποτέ διπλά.', messages: [{ role: 'user', content }] })
    });

    const d = await resp.json();
    if (d.error) throw new Error(d.error.message);
    const text = d.content.map(i => i.text || '').join('');
    // Extract JSON robustly - find first { and last }
    const jsonMatch = text.match(/\{[\s\S]*\}/);
    if (!jsonMatch) throw new Error('Το AI δεν επέστρεψε έγκυρο JSON. Δοκίμασε ξανά.');
    const parsed = JSON.parse(jsonMatch[0]);
    currentResult = { ...parsed, date: new Date().toISOString() };
    saveToHistory(currentResult);
    renderResult(parsed, area);

  } catch (err) {
    area.innerHTML = `<div class="error-box">Σφάλμα: ${err.message}</div>`;
  } finally {
    btn.disabled = !(files.price && files.data);
    btn.textContent = 'Υπολόγισε αξία extras';
  }
}

// ─── RENDER RESULT ────────────────────────────────────
function renderResult(data, container) {
  let html = '';

  if (data.vehicle) {
    html += `<div class="vehicle-badge"><div class="dot"></div>${data.vehicle}</div>`;
  }

  if (data.extras && data.extras.length > 0) {
    html += `<table class="extras-table">
      <thead><tr><th>Extra</th><th>Κωδικός</th><th>Αξία</th></tr></thead><tbody>`;
    data.extras.forEach(e => {
      html += `<tr>
        <td>${e.name}</td>
        <td class="code-cell">${e.code || '—'}</td>
        <td>${Number(e.value).toLocaleString('el-GR',{style:'currency',currency:'EUR'})}</td>
      </tr>`;
    });
    html += `</tbody></table>`;
  }

  if (data.not_found && data.not_found.length > 0) {
    html += `<div class="not-found-section">
      <p class="nf-title">Χωρίς τιμή στον κατάλογο</p>`;
    data.not_found.forEach(n => { html += `<div class="nf-item">— ${n}</div>`; });
    html += `</div>`;
  }

  html += `<div class="total-bar">
    <span class="total-label">Σύνολο Extras</span>
    <span class="total-value">${Number(data.total).toLocaleString('el-GR',{style:'currency',currency:'EUR'})}</span>
  </div>`;

  html += `<button class="pdf-btn" onclick="exportPDF()">↓ Κατέβασε ως PDF</button>`;

  container.innerHTML = html;
}

// ─── EXPORT PDF ───────────────────────────────────────
function exportPDF() {
  if (!currentResult) return;
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();
  let y = 20;

  doc.setFont('helvetica', 'bold');
  doc.setFontSize(16);
  doc.text('Αναφορα Extras Οχηματος', 14, y); y += 10;

  doc.setFont('helvetica', 'normal');
  doc.setFontSize(11);
  doc.setTextColor(100);
  doc.text(currentResult.vehicle || '', 14, y); y += 6;
  doc.text(new Date(currentResult.date).toLocaleDateString('el-GR'), 14, y); y += 12;

  doc.setTextColor(0);
  doc.setFont('helvetica', 'bold');
  doc.setFontSize(10);
  doc.text('EXTRA', 14, y);
  doc.text('ΚΩΔΙΚΟΣ', 100, y);
  doc.text('ΑΞΙΑ', 170, y, { align: 'right' });
  y += 4;
  doc.setDrawColor(200); doc.line(14, y, 196, y); y += 6;

  doc.setFont('helvetica', 'normal');
  (currentResult.extras || []).forEach(e => {
    doc.text(e.name.slice(0, 50), 14, y);
    doc.text(e.code || '', 100, y);
    doc.text(Number(e.value).toLocaleString('el-GR', { style: 'currency', currency: 'EUR' }), 170, y, { align: 'right' });
    y += 7;
    if (y > 270) { doc.addPage(); y = 20; }
  });

  y += 4;
  doc.setDrawColor(200); doc.line(14, y, 196, y); y += 8;
  doc.setFont('helvetica', 'bold');
  doc.setFontSize(12);
  doc.text('ΣΥΝΟΛΟ:', 100, y);
  doc.text(Number(currentResult.total).toLocaleString('el-GR', { style: 'currency', currency: 'EUR' }), 170, y, { align: 'right' });

  const fname = (currentResult.vehicle || 'extras').replace(/\s+/g, '_') + '_' + new Date(currentResult.date).toISOString().slice(0,10) + '.pdf';
  doc.save(fname);
}

// ─── HISTORY ──────────────────────────────────────────
function getHistory() {
  try { return JSON.parse(localStorage.getItem('extras_history') || '[]'); } catch { return []; }
}

function saveToHistory(entry) {
  const h = getHistory();
  h.unshift(entry);
  if (h.length > 50) h.pop();
  localStorage.setItem('extras_history', JSON.stringify(h));
  renderHistory();
}

function clearHistory() {
  if (!confirm('Να διαγραφεί το ιστορικό;')) return;
  localStorage.removeItem('extras_history');
  renderHistory();
}

function renderHistory() {
  const list = document.getElementById('history-list');
  const h = getHistory();
  if (!h.length) {
    list.innerHTML = '<div class="history-empty">Δεν υπάρχουν<br>αναλύσεις ακόμα.</div>';
    return;
  }
  list.innerHTML = h.map((entry, i) => `
    <div class="history-card" onclick="loadHistory(${i})">
      <div class="h-vehicle">${entry.vehicle || 'Άγνωστο όχημα'}</div>
      <div class="h-meta">
        <span class="h-date">${new Date(entry.date).toLocaleDateString('el-GR', {day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'})}</span>
        <span class="h-total">${Number(entry.total).toLocaleString('el-GR',{style:'currency',currency:'EUR'})}</span>
      </div>
    </div>`).join('');
}

function loadHistory(i) {
  const h = getHistory();
  currentResult = h[i];
  const area = document.getElementById('results-area');
  renderResult(h[i], area);
  area.scrollIntoView({ behavior: 'smooth' });
}
</script>
